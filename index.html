<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🎮 Jogos do Pedro</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    background: #0a0a2e;
    font-family: 'Segoe UI', Arial, sans-serif;
    color: white;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 2rem;
    overflow: hidden;
  }

  #stars { position:fixed; top:0; left:0; width:100%; height:100%; pointer-events:none; z-index:0; }
  .star  { position:absolute; background:white; border-radius:50%; animation:tw var(--d) infinite alternate; }
  @keyframes tw { from{opacity:.1} to{opacity:.9} }

  .conteudo { position:relative; z-index:1; text-align:center; width:100%; max-width:600px; }

  .rocket { font-size:5rem; display:block; animation:bal 1.5s ease-in-out infinite alternate; margin-bottom:.5rem; }
  @keyframes bal { from{transform:translateY(0) rotate(-8deg)} to{transform:translateY(-18px) rotate(8deg)} }

  h1 { font-size:2.8rem; text-shadow:0 0 30px #a29bfe; margin-bottom:.3rem; }
  .sub { font-size:1.2rem; color:#b2bec3; margin-bottom:2.5rem; }

  .jogos { display:grid; grid-template-columns:1fr 1fr; gap:1.2rem; }
  @media(max-width:480px){ .jogos{ grid-template-columns:1fr; } }

  .jogo-card {
    display:block; text-decoration:none;
    padding:2rem 1.5rem; border-radius:24px;
    border:3px solid transparent;
    transition:transform .2s, box-shadow .2s;
    cursor:pointer;
  }
  .jogo-card:hover { transform:scale(1.06); box-shadow:0 0 30px #fff3; }

  .jogo-card .icon { font-size:3.5rem; display:block; margin-bottom:.8rem; }
  .jogo-card h2   { font-size:1.4rem; font-weight:bold; margin-bottom:.4rem; }
  .jogo-card p    { font-size:.95rem; opacity:.85; line-height:1.4; }

  .card-espaco {
    background: linear-gradient(135deg, #1a1a5e, #2d1b69);
    border-color: #6c5ce755;
  }
  .card-mat {
    background: linear-gradient(135deg, #1a3a1a, #1a4a2a);
    border-color: #00b89455;
  }
</style>
</head>
<body>
<div id="stars"></div>

<div class="conteudo">
  <span class="rocket">🎮</span>
  <h1>Jogos do Pedro!</h1>
  <p class="sub">Escolha um jogo para aprender brincando! ⭐</p>

  <div class="jogos">
    <a href="sistema_solar.html" class="jogo-card card-espaco">
      <span class="icon">🚀</span>
      <h2>Sistema Solar</h2>
      <p>Explore os planetas, aprenda curiosidades e faça o Quiz Espacial!</p>
    </a>

    <a href="matematica.html" class="jogo-card card-mat">
      <span class="icon">🧮</span>
      <h2>Pedro Matemático</h2>
      <p>Figuras, ábaco, números, decomposição e muito mais!</p>
    </a>
  </div>
</div>

<script>
  const c = document.getElementById('stars');
  for(let i=0;i<150;i++){
    const s=document.createElement('div'); s.className='star';
    const sz=Math.random()*2.5+.5;
    s.style.cssText=`width:${sz}px;height:${sz}px;top:${Math.random()*100}%;left:${Math.random()*100}%;--d:${(Math.random()*2+.8).toFixed(1)}s`;
    c.appendChild(s);
  }
</script>
</body>
</html>
